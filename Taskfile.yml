version: "3"

vars:
  STACK:
    sh: |
      if [ -f Cargo.toml ]; then
        echo rust
      elif [ -f pyproject.toml ] || [ -f setup.py ] || [ -f requirements.txt ]; then
        echo python
      elif [ -f package.json ] || [ -f bun.lockb ] || [ -f pnpm-lock.yaml ] || [ -f yarn.lock ] || [ -f package-lock.json ]; then
        echo javascript
      elif [ -f go.mod ]; then
        echo go
      elif [ -f registry.yaml ] && [ -d specs ] && [ -d adrs ]; then
        echo docs
      else
        echo unknown
      fi

tasks:
  default:
    desc: Show the detected stack and run the repository build task
    cmds:
      - task: build

  build:
    desc: Build or validate the repository for the detected stack
    cmds:
      - cmd: |
          set -euo pipefail
          case "{{.STACK}}" in
            rust)
              cargo build
              ;;
            python)
              if command -v uv >/dev/null 2>&1; then
                uv build
              else
                python -m build
              fi
              ;;
            javascript)
              if [ -f bun.lockb ]; then
                bun run build
              elif [ -f pnpm-lock.yaml ]; then
                pnpm build
              elif [ -f yarn.lock ]; then
                yarn build
              else
                npm run build
              fi
              ;;
            go)
              go build ./...
              ;;
            docs)
              markdownlint "**/*.md" --ignore archive
              yamllint .
              ;;
            *)
              echo "Unable to detect a supported stack from the repository root." >&2
              exit 1
              ;;
          esac

  test:
    desc: Run the primary test or validation command for the detected stack
    cmds:
      - cmd: |
          set -euo pipefail
          case "{{.STACK}}" in
            rust)
              cargo test
              ;;
            python)
              if command -v uv >/dev/null 2>&1; then
                uv run pytest
              else
                pytest
              fi
              ;;
            javascript)
              if [ -f bun.lockb ]; then
                bun test
              elif [ -f pnpm-lock.yaml ]; then
                pnpm test
              elif [ -f yarn.lock ]; then
                yarn test
              else
                npm test
              fi
              ;;
            go)
              go test ./...
              ;;
            docs)
              yamllint .
              ;;
            *)
              echo "Unable to detect a supported stack from the repository root." >&2
              exit 1
              ;;
          esac

  lint:
    desc: Run stack-specific linting
    cmds:
      - cmd: |
          set -euo pipefail
          case "{{.STACK}}" in
            rust)
              cargo clippy -- -D warnings
              ;;
            python)
              if command -v uv >/dev/null 2>&1; then
                uv run ruff check .
              else
                ruff check .
              fi
              ;;
            javascript)
              if [ -f bun.lockb ]; then
                bunx eslint .
              elif [ -f pnpm-lock.yaml ]; then
                pnpm lint
              elif [ -f yarn.lock ]; then
                yarn lint
              else
                npm run lint
              fi
              ;;
            go)
              golangci-lint run
              ;;
            docs)
              markdownlint "**/*.md" --ignore archive
              ;;
            *)
              echo "Unable to detect a supported stack from the repository root." >&2
              exit 1
              ;;
          esac

  clean:
    desc: Remove common build and cache artifacts
    cmds:
      - rm -rf .task .pytest_cache .ruff_cache .mypy_cache .coverage coverage htmlcov dist build target node_modules .markdownlintcache .yamllint .yamllintcache
